<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bán giày</title>
    <style>
body {
    font-family: Arial;
    margin: 0;
    background: #f9f9f9;
}

/* HEADER (giữ đơn giản) */
.header {
    background: #2fa4c7;
    display: flex;
    align-items: center;
    padding: 10px 30px;
}

.logo img {
    width: 70px;
}

.menu {
    margin-left: 40px;
}

.menu a {
    text-decoration: none;
    color: black;
    margin-right: 15px;
    padding: 8px 12px;
    border-radius: 5px;
    transition: 0.2s;
}
.menu a:hover {
    background: #d9eef5;
}
.title {
    text-align: center;
    margin: 20px 0;
}

.products {
    display: flex;
    justify-content: center;
    gap: 100px;
    padding: 20px;
}

.card {
    width: 230px;
    text-align: center;
    background: white;
    border-radius: 8px;
    padding-bottom: 10px;
    border: 1px solid #ddd;
}

.info {
    background: #1f5f8b;
    color: white;
    padding: 10px;
    border-radius: 8px 8px 0 0;
}

.card img {

    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 0 0 10px 10px;

    transition: 0.3s;
}
.card:hover img {
    transform: scale(1.05);
}
.footer {
    background: #2fa4c7;
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 15px;
}
.footer a {
    text-decoration: none;
    color: black;
    padding: 6px 10px;
    border-radius: 5px;
    transition: 0.2s;
}

.footer a:hover {
    background: #d9eef5;
}
    </style>
</head>
<body>
    <div class="header">
    <div class="logo">
        <img src="img_giay_new.png" alt="logo">
    </div>
    <div class="menu">
        <a href="#">Trang chủ</a>
        <a href="#">Giày Nam</a>
        <a href="#">Giày Nữ</a>
        <a href="#">Sản Phẩm</a>
        <a href="#">Liên Hệ</a>
    </div>
</div>
<h2 class="title">Sản phẩm mới</h2>
<div class="products">

    <div class="card">
        <div class="info">
            <h3>Giày 1</h3>
            <p>30000 VND</p>
        </div>
        <img src="Giay1.png">
    </div>

    <div class="card">
        <div class="info">
            <h3>Giày 2</h3>
            <p>60000 VND</p>
        </div>
        <img src="Giay2.png">
    </div>

    <div class="card">
        <div class="info">
            <h3>Giày 3</h3>
            <p>100000 VND</p>
        </div>
        <img src="Giay3.png">
    </div>

</div>
<div class="footer">
    <a href="#">Về chúng tôi</a>
    <a href="#">Liên hệ</a>
    <a href="#">Email</a>
</div>

</body>
</html>
